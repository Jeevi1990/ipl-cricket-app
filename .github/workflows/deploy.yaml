name: Build and Deploy to Minikube

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ipl-cricket-app

jobs:
  deploy-local-minikube:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image in Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/ipl-cricket-app -n ipl-cricket

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/ipl-cricket-app -n ipl-cricket --timeout=120s

      - name: Get deployment status
        run: |
          kubectl get pods -n ipl-cricket
          kubectl get services -n ipl-cricket
